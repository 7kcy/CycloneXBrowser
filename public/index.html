<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cyclone X</title>
  <link rel="icon" href="/CyLogo_png.png" type="image/png" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --font-display: 'Syne', sans-serif;
      --font-mono: 'DM Mono', monospace;
      --bg: #0a0a0a; --bg-2: #111111; --bg-3: #1a1a1a;
      --surface: #181818; --surface-2: #232323;
      --border: #2a2a2a; --border-2: #383838;
      --text: #f0f0f0; --text-2: #a0a0a0; --text-3: #606060;
      --accent-glow: rgba(224,224,224,0.08);
      --chip-bg: #1e1e1e; --chip-border: #2e2e2e; --chip-text: #888;
      --shadow: 0 4px 24px rgba(0,0,0,0.6); --shadow-sm: 0 2px 8px rgba(0,0,0,0.4);
      --kbd-bg: #222; --kbd-border: #3a3a3a; --scrollbar: #2a2a2a;
    }
    [data-theme="light"] {
      --bg: #f5f5f5; --bg-2: #eeeeee; --bg-3: #e8e8e8;
      --surface: #ffffff; --surface-2: #f0f0f0;
      --border: #d8d8d8; --border-2: #c0c0c0;
      --text: #111111; --text-2: #555555; --text-3: #999999;
      --accent-glow: rgba(0,0,0,0.05);
      --chip-bg: #eaeaea; --chip-border: #d4d4d4; --chip-text: #666;
      --shadow: 0 4px 24px rgba(0,0,0,0.12); --shadow-sm: 0 2px 8px rgba(0,0,0,0.08);
      --kbd-bg: #e8e8e8; --kbd-border: #c8c8c8; --scrollbar: #c8c8c8;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; scroll-behavior: smooth; }
    body {
      font-family: var(--font-display);
      background: var(--bg); color: var(--text);
      min-height: 100vh;
      transition: background 0.25s ease, color 0.25s ease;
      overflow-x: hidden;
    }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 8px; }

    /* ── Topbar ─────────────────────────────────────────── */
    .topbar {
      position: fixed; top: 0; left: 0; right: 0; height: 54px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px;
      background: var(--bg); border-bottom: 1px solid var(--border);
      z-index: 100; transition: background 0.25s;
    }
    .topbar-left { display: flex; align-items: center; gap: 10px; }
    .topbar-logo {
      height: 28px; width: auto; object-fit: contain;
    }
    [data-theme="light"] .topbar-logo { filter: invert(1); }
    .topbar-logo-mark {
      display: none;
      width: 26px; height: 26px; background: var(--text); color: var(--bg);
      border-radius: 6px; font-family: var(--font-display); font-weight: 800;
      font-size: 10px; align-items: center; justify-content: center;
    }
    .topbar-name {
      font-family: var(--font-display); font-size: 15px;
      font-weight: 800; letter-spacing: -0.5px; color: var(--text);
    }
    .topbar-name span { color: var(--text-3); font-weight: 400; }
    .icon-btn {
      background: none; border: 1px solid var(--border); color: var(--text-2);
      width: 34px; height: 34px; border-radius: 8px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .icon-btn:hover { background: var(--surface-2); color: var(--text); border-color: var(--border-2); }

    /* ── Settings ───────────────────────────────────────── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.5);
      backdrop-filter: blur(4px); z-index: 200;
      opacity: 0; pointer-events: none; transition: opacity 0.2s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .settings-panel {
      position: fixed; top: 0; right: 0; height: 100vh; width: 300px;
      background: var(--bg-2); border-left: 1px solid var(--border);
      z-index: 300; padding: 24px;
      transform: translateX(100%);
      transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
      box-shadow: -8px 0 40px rgba(0,0,0,0.3);
    }
    .settings-panel.open { transform: translateX(0); }
    .settings-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px; }
    .settings-title { font-family: var(--font-display); font-size: 18px; font-weight: 700; color: var(--text); letter-spacing: -0.5px; }
    .close-btn {
      background: none; border: 1px solid var(--border); color: var(--text-3);
      width: 30px; height: 30px; border-radius: 6px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; font-size: 12px; transition: all 0.15s;
    }
    .close-btn:hover { color: var(--text); background: var(--surface-2); }
    .settings-section { margin-bottom: 28px; }
    .settings-label {
      font-family: var(--font-mono); font-size: 10px; color: var(--text-3);
      letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 12px;
    }
    .theme-toggle-group { display: flex; gap: 8px; }
    .theme-btn {
      flex: 1; background: var(--surface-2); border: 1px solid var(--border);
      color: var(--text-3); font-family: var(--font-mono); font-size: 12px;
      padding: 10px 8px; border-radius: 8px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 6px; transition: all 0.15s;
    }
    .theme-btn:hover { border-color: var(--border-2); color: var(--text-2); }
    .theme-btn.active { background: var(--text); border-color: var(--text); color: var(--bg); }
    .settings-meta { font-family: var(--font-mono); font-size: 11px; color: var(--text-3); line-height: 1.6; }

    /* ── Home ───────────────────────────────────────────── */
    .home {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 54px 24px 80px; animation: fadeUp 0.5s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .home-center {
      display: flex; flex-direction: column; align-items: center;
      gap: 36px; width: 100%; max-width: 620px;
    }
    .brand-block { display: flex; flex-direction: column; align-items: center; gap: 14px; }
    .main-logo {
      width: 80px; height: 80px; object-fit: contain;
      animation: spinIn 0.7s cubic-bezier(0.34,1.56,0.64,1) both;
      filter: drop-shadow(0 0 24px rgba(255,255,255,0.08));
    }
    [data-theme="light"] .main-logo { filter: drop-shadow(0 0 24px rgba(0,0,0,0.1)); }
    .main-logo-fallback {
      width: 80px; height: 80px; background: var(--text); color: var(--bg);
      border-radius: 20px; font-family: var(--font-display); font-weight: 800;
      font-size: 24px; display: flex; align-items: center; justify-content: center;
      animation: spinIn 0.7s cubic-bezier(0.34,1.56,0.64,1) both;
      box-shadow: 0 0 40px rgba(255,255,255,0.07);
    }
    @keyframes spinIn {
      from { opacity: 0; transform: rotate(-20deg) scale(0.7); }
      to   { opacity: 1; transform: rotate(0deg) scale(1); }
    }
    .brand-name {
      font-family: var(--font-display); font-size: 52px; font-weight: 800;
      letter-spacing: -2.5px; color: var(--text); line-height: 1;
    }
    .brand-x { color: var(--text-3); font-weight: 400; }
    .brand-tagline {
      font-family: var(--font-mono); font-size: 12px;
      color: var(--text-3); letter-spacing: 0.05em;
    }

    /* ── Search ─────────────────────────────────────────── */
    .search-wrap { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 10px; }
    .search-bar {
      width: 100%; display: flex; align-items: center;
      background: var(--surface); border: 1px solid var(--border-2);
      border-radius: 12px; padding: 4px 6px 4px 12px; gap: 8px;
      transition: all 0.2s; box-shadow: var(--shadow-sm);
    }
    .search-bar:focus-within { border-color: var(--text-3); box-shadow: 0 0 0 3px var(--accent-glow), var(--shadow-sm); }
    .search-bar input {
      flex: 1; background: none; border: none; outline: none;
      font-family: var(--font-display); font-size: 16px; color: var(--text); padding: 8px 4px;
    }
    .search-bar input::placeholder { color: var(--text-3); }
    .search-icon-btn {
      background: none; border: none; color: var(--text-3); cursor: pointer;
      width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
      border-radius: 8px; transition: all 0.15s; flex-shrink: 0;
    }
    .search-icon-btn:hover { color: var(--text); background: var(--surface-2); }
    .search-go-btn { background: var(--text); color: var(--bg); width: 38px; height: 38px; border-radius: 9px; }
    .search-go-btn:hover { opacity: 0.85; color: var(--bg); }
    .search-hint { font-family: var(--font-mono); font-size: 11px; color: var(--text-3); }
    kbd {
      background: var(--kbd-bg); border: 1px solid var(--kbd-border); border-radius: 4px;
      padding: 1px 5px; font-family: var(--font-mono); font-size: 10px; color: var(--text-2);
    }
    .quick-chips { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
    .chip {
      background: var(--chip-bg); border: 1px solid var(--chip-border);
      color: var(--chip-text); font-family: var(--font-mono); font-size: 11px;
      padding: 6px 14px; border-radius: 100px; cursor: pointer; transition: all 0.15s;
    }
    .chip:hover { background: var(--surface-2); color: var(--text); border-color: var(--border-2); transform: translateY(-1px); }

    /* ── Results ────────────────────────────────────────── */
    .results-screen { min-height: 100vh; padding-top: 54px; animation: fadeUp 0.3s ease both; }
    .results-screen.hidden { display: none; }
    .home.hidden { display: none; }
    .results-topbar {
      position: sticky; top: 54px; background: var(--bg);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px; padding: 10px 24px; z-index: 90;
    }
    .back-btn {
      background: none; border: 1px solid var(--border); color: var(--text-2);
      width: 34px; height: 34px; border-radius: 8px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; transition: all 0.15s; flex-shrink: 0;
    }
    .back-btn:hover { background: var(--surface-2); color: var(--text); }
    .results-search-bar {
      flex: 1; display: flex; align-items: center;
      background: var(--surface); border: 1px solid var(--border-2);
      border-radius: 8px; padding: 0 8px 0 14px; gap: 6px; transition: all 0.2s;
    }
    .results-search-bar:focus-within { border-color: var(--text-3); box-shadow: 0 0 0 3px var(--accent-glow); }
    .results-search-bar input {
      flex: 1; background: none; border: none; outline: none;
      font-family: var(--font-display); font-size: 14px; color: var(--text); padding: 9px 0;
    }
    .results-search-bar input::placeholder { color: var(--text-3); }
    .results-body { max-width: 760px; margin: 0 auto; padding: 32px 24px 80px; }
    .results-query-label {
      font-family: var(--font-mono); font-size: 11px; color: var(--text-3);
      letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 20px;
    }
    .loading-state {
      display: flex; align-items: center; gap: 14px;
      color: var(--text-3); font-family: var(--font-mono); font-size: 13px; padding: 48px 0;
    }
    .spinner {
      width: 18px; height: 18px; border: 2px solid var(--border);
      border-top-color: var(--text-2); border-radius: 50%; animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .result-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 24px 28px; margin-bottom: 16px;
      animation: fadeUp 0.35s ease both; transition: border-color 0.15s;
    }
    .result-card:hover { border-color: var(--border-2); }
    .result-card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
    .result-badge {
      font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--text-3);
      background: var(--bg-3, #1a1a1a); border: 1px solid var(--border);
      padding: 3px 8px; border-radius: 4px;
    }
    .ai-badge { color: var(--text-2); border-color: var(--border-2); }
    .result-content { font-size: 15px; line-height: 1.75; color: var(--text-2); }
    .result-content p { margin-bottom: 12px; }
    .result-content p:last-child { margin-bottom: 0; }
    .result-content strong { color: var(--text); font-weight: 600; }
    .result-content h3 { font-size: 15px; font-weight: 700; color: var(--text); margin: 16px 0 6px; }
    .result-content ul, .result-content ol { padding-left: 20px; margin-bottom: 12px; }
    .result-content li { margin-bottom: 4px; line-height: 1.7; }
    .result-content code {
      font-family: var(--font-mono); font-size: 12px;
      background: var(--bg-3, #1a1a1a); border: 1px solid var(--border);
      padding: 2px 6px; border-radius: 4px; color: var(--text);
    }
    .result-footer {
      display: flex; align-items: center; gap: 12px;
      margin-top: 16px; padding-top: 14px; border-top: 1px solid var(--border);
    }
    .result-footer-text { font-family: var(--font-mono); font-size: 10px; color: var(--text-3); }
    .error-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 32px 28px;
      text-align: center; color: var(--text-3);
      font-family: var(--font-mono); font-size: 13px; line-height: 1.8;
    }
    .error-card .error-icon { display: block; font-size: 28px; margin-bottom: 12px; }

    /* ── Voice ──────────────────────────────────────────── */
    .voice-indicator {
      position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
      background: var(--surface); border: 1px solid var(--border-2);
      border-radius: 100px; padding: 10px 20px;
      display: flex; align-items: center; gap: 12px;
      font-family: var(--font-mono); font-size: 12px; color: var(--text-2);
      box-shadow: var(--shadow); z-index: 500;
    }
    .voice-indicator.hidden { display: none; }
    .voice-pulse {
      width: 10px; height: 10px; border-radius: 50%; background: #e0e0e0;
      animation: pulse 1s ease infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.8)} }
    .voice-indicator button {
      background: none; border: none; color: var(--text-3);
      font-family: var(--font-mono); font-size: 11px; cursor: pointer; padding: 0;
    }
    .voice-indicator button:hover { color: var(--text); }

    @media (max-width: 600px) {
      .brand-name { font-size: 38px; }
      .main-logo, .main-logo-fallback { width: 60px; height: 60px; }
      .results-body { padding: 20px 14px 60px; }
      .result-card { padding: 16px 18px; }
      .settings-panel { width: 100%; }
    }
  </style>
</head>
<body>

  <!-- Settings -->
  <div class="modal-overlay" id="settingsOverlay" onclick="closeSettings()"></div>
  <div class="settings-panel" id="settingsPanel">
    <div class="settings-header">
      <span class="settings-title">Settings</span>
      <button class="close-btn" onclick="closeSettings()">✕</button>
    </div>
    <div class="settings-section">
      <div class="settings-label">Appearance</div>
      <div class="theme-toggle-group">
        <button class="theme-btn active" id="darkBtn" onclick="setTheme('dark')"><span>◑</span> Dark</button>
        <button class="theme-btn" id="lightBtn" onclick="setTheme('light')"><span>○</span> Light</button>
      </div>
    </div>
    <div class="settings-section">
      <div class="settings-label">About</div>
      <div class="settings-meta">Cyclone X v1.0<br/>Powered by Claude · Hosted on Vercel</div>
    </div>
  </div>

  <!-- Topbar -->
  <header class="topbar">
    <div class="topbar-left">
      <img src="/CyLogo_png.png" alt="CX" class="topbar-logo"
           onerror="this.style.display='none';document.getElementById('tbFallback').style.display='flex'"/>
      <div class="topbar-logo-mark" id="tbFallback">CX</div>
      <div class="topbar-name">Cyclone<span>X</span></div>
    </div>
    <div class="topbar-right">
      <button class="icon-btn" onclick="openSettings()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- Home -->
  <main class="home" id="homeScreen">
    <div class="home-center">
      <div class="brand-block">
        <img src="/CyLogo_png.png" alt="Cyclone X" class="main-logo"
             onerror="this.style.display='none';document.getElementById('mainFallback').style.display='flex'"/>
        <div class="main-logo-fallback" id="mainFallback" style="display:none">CX</div>
        <h1 class="brand-name">Cyclone<span class="brand-x">X</span></h1>
        <p class="brand-tagline">AI-powered search. Instant answers.</p>
      </div>
      <div class="search-wrap">
        <div class="search-bar">
          <button class="search-icon-btn" onclick="startVoice()" title="Voice (Alt+V)">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
              <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
              <line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/>
            </svg>
          </button>
          <input type="text" id="homeInput" placeholder="Ask anything…"
                 autocomplete="off" onkeydown="handleKey(event,'home')"/>
          <button class="search-icon-btn search-go-btn" onclick="doSearch()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
          </button>
        </div>
        <div class="search-hint">Press <kbd>Enter</kbd> to search · <kbd>Alt+V</kbd> for voice</div>
      </div>
      <div class="quick-chips">
        <button class="chip" onclick="quickSearch('Latest AI news 2025')">AI News</button>
        <button class="chip" onclick="quickSearch('How does quantum computing work?')">Quantum Computing</button>
        <button class="chip" onclick="quickSearch('Best programming languages 2025')">Top Languages</button>
        <button class="chip" onclick="quickSearch('Space exploration updates 2025')">Space</button>
      </div>
    </div>
  </main>

  <!-- Results -->
  <div class="results-screen hidden" id="resultsScreen">
    <div class="results-topbar">
      <button class="back-btn" onclick="goHome()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
        </svg>
      </button>
      <div class="results-search-bar">
        <input type="text" id="resultsInput" placeholder="Search…" onkeydown="handleKey(event,'results')"/>
        <button class="search-icon-btn" onclick="doSearchFromResults()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
        </button>
      </div>
    </div>
    <div class="results-body">
      <div class="results-query-label" id="queryLabel"></div>
      <div id="resultsContainer"></div>
    </div>
  </div>

  <!-- Voice -->
  <div class="voice-indicator hidden" id="voiceIndicator">
    <div class="voice-pulse"></div>
    <span>Listening…</span>
    <button onclick="stopVoice()">Stop</button>
  </div>

  <script>
  'use strict';
  let currentTheme = 'dark', recognition = null, isListening = false;

  document.addEventListener('DOMContentLoaded', () => {
    const t = localStorage.getItem('cx-theme') || 'dark';
    setTheme(t, true);
    document.getElementById('homeInput').focus();
    document.addEventListener('keydown', e => { if (e.altKey && e.key === 'v') startVoice(); });
  });

  function setTheme(theme, silent = false) {
    currentTheme = theme;
    document.documentElement.setAttribute('data-theme', theme);
    document.getElementById('darkBtn').classList.toggle('active', theme === 'dark');
    document.getElementById('lightBtn').classList.toggle('active', theme === 'light');
    if (!silent) localStorage.setItem('cx-theme', theme);
  }

  function openSettings()  { document.getElementById('settingsPanel').classList.add('open');    document.getElementById('settingsOverlay').classList.add('open'); }
  function closeSettings() { document.getElementById('settingsPanel').classList.remove('open'); document.getElementById('settingsOverlay').classList.remove('open'); }

  function goHome() {
    document.getElementById('resultsScreen').classList.add('hidden');
    document.getElementById('homeScreen').classList.remove('hidden');
    document.getElementById('homeInput').value = '';
    document.getElementById('homeInput').focus();
  }

  function handleKey(e, src) { if (e.key === 'Enter') src === 'home' ? doSearch() : doSearchFromResults(); }
  function doSearch()          { const q = document.getElementById('homeInput').value.trim();    if (q) runSearch(q); }
  function doSearchFromResults(){ const q = document.getElementById('resultsInput').value.trim(); if (q) runSearch(q); }
  function quickSearch(q)      { document.getElementById('homeInput').value = q; runSearch(q); }

  async function runSearch(query) {
    document.getElementById('homeScreen').classList.add('hidden');
    document.getElementById('resultsScreen').classList.remove('hidden');
    document.getElementById('resultsInput').value = query;
    document.getElementById('queryLabel').textContent = `Results for: "${query}"`;
    document.getElementById('resultsContainer').innerHTML = `<div class="loading-state"><div class="spinner"></div><span>Cyclone X is thinking…</span></div>`;
    window.scrollTo({ top: 0 });

    try {
      const res  = await fetch('/api/search', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query })
      });
      const data = await res.json();
      if (!res.ok || data.error) throw new Error(data.error || `Error ${res.status}`);

      const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      document.getElementById('resultsContainer').innerHTML = `
        <div class="result-card">
          <div class="result-card-header">
            <span class="result-badge ai-badge">⚡ AI Answer</span>
            <span class="result-badge">Cyclone X</span>
          </div>
          <div class="result-content">${data.result}</div>
          <div class="result-footer">
            <span class="result-footer-text">Generated at ${time} · Powered by Claude</span>
          </div>
        </div>
        ${suggestionsCard(query)}`;
    } catch (err) {
      document.getElementById('resultsContainer').innerHTML = `
        <div class="error-card">
          <span class="error-icon">⚡</span>
          Something went wrong.<br/>
          <span style="font-size:11px;opacity:0.6;margin-top:4px;display:block;">${escHTML(err.message)}</span>
        </div>`;
    }
  }

  function suggestionsCard(query) {
    const base = query.toLowerCase().split(' ').slice(0,3).join(' ');
    const s = [`How does ${base} work`,`What is ${base}`,`${base} explained`,`Best ${base}`,`${base} 2025`].filter(x=>x!==query).slice(0,5);
    const chips = s.map(x=>`<button class="chip" onclick="quickSearch('${escAttr(x)}')">${escHTML(x)}</button>`).join('');
    return `<div class="result-card" style="margin-top:12px;"><div class="result-card-header"><span class="result-badge">Related Searches</span></div><div class="quick-chips" style="justify-content:flex-start;">${chips}</div></div>`;
  }

  function startVoice() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { alert('Voice search requires Chrome or Edge.'); return; }
    if (isListening) { stopVoice(); return; }
    recognition = new SR();
    recognition.lang = 'en-US'; recognition.interimResults = false;
    recognition.onstart  = () => { isListening = true; document.getElementById('voiceIndicator').classList.remove('hidden'); };
    recognition.onresult = e  => { const t = e.results[0][0].transcript; document.getElementById('homeInput').value = t; stopVoice(); runSearch(t); };
    recognition.onerror  = () => stopVoice();
    recognition.onend    = () => stopVoice();
    recognition.start();
  }
  function stopVoice() {
    isListening = false;
    document.getElementById('voiceIndicator').classList.add('hidden');
    if (recognition) { recognition.stop(); recognition = null; }
  }

  function escHTML(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  function escAttr(s) { return String(s).replace(/'/g,"\\'"); }
  </script>
</body>
</html>
